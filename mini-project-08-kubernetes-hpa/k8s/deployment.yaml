apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-demo-app
  namespace: hpa-demo
  labels:
    app: hpa-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hpa-demo-app
  template:
    metadata:
      labels:
        app: hpa-demo-app
    spec:
      containers:
        - name: hpa-demo-app
          image: hpa-demo-app:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
