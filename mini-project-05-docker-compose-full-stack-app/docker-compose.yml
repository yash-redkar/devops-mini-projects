services:
  frontend:
    image: nginx:alpine
    container_name: student-notes-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
    networks:
      - student-notes-network

  backend:
    build:
      context: ./backend
    container_name: student-notes-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT}:5000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - student-notes-network

  db:
    image: postgres:16-alpine
    container_name: student-notes-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_notes_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - student-notes-network

volumes:
  postgres_notes_data:
    name: student_notes_postgres_data

networks:
  student-notes-network:
    name: student_notes_network
    driver: bridge
