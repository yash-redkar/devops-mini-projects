apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: monitoring-demo-servicemonitor
  namespace: monitoring-demo
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: monitoring-demo-app
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - monitoring-demo