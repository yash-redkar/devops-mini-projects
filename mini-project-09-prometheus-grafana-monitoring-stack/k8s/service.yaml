apiVersion: v1
kind: Service
metadata:
  name: monitoring-demo-service
  namespace: monitoring-demo
  labels:
    app: monitoring-demo-app
spec:
  type: NodePort
  selector:
    app: monitoring-demo-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30089